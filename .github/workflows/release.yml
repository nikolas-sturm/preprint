name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Configure target-cpu
        shell: bash
        run: |
          case "${{ runner.arch }}" in
            X64)   echo "RUSTFLAGS=-C target-cpu=x86-64-v3" >> $GITHUB_ENV ;;
            ARM64) echo "RUSTFLAGS=-C target-cpu=apple-m1"  >> $GITHUB_ENV ;;
          esac

      - uses: dtolnay/rust-toolchain@stable

        with:
          components: rustfmt

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev

      - name: Verify
        run: |
          cargo fmt --check
          cargo test
          cargo build --release

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle
        continue-on-error: true
        shell: bash
        run: cargo bundle --release

      - name: Upload release binary
        uses: actions/upload-artifact@v7
        with:
          name: preprint-${{ runner.os }}-binary
          path: |
            target/release/preprint
            target/release/preprint.exe
          if-no-files-found: warn

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: preprint-${{ runner.os }}-bundle
          path: |
            target/release/bundle/**
          if-no-files-found: warn

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p staging
          # Raw binaries (required)
          cp artifacts/preprint-Linux-binary/preprint          "staging/preprint-${VERSION}-x86_64-unknown-linux-gnu"
          cp artifacts/preprint-Windows-binary/preprint.exe     "staging/preprint-${VERSION}-x86_64-pc-windows-msvc.exe"
          cp artifacts/preprint-macOS-binary/preprint           "staging/preprint-${VERSION}-aarch64-apple-darwin"
          # Installers / packages (best-effort, bundles may fail)
          cp "artifacts/preprint-Linux-bundle/appimage/"*.AppImage "staging/preprint-${VERSION}-x86_64-unknown-linux-gnu.AppImage" 2>/dev/null || true
          cp "artifacts/preprint-Linux-bundle/deb/"*.deb          "staging/preprint-${VERSION}-amd64.deb"                            2>/dev/null || true
          cp "artifacts/preprint-macOS-bundle/dmg/"*.dmg           "staging/Preprint-${VERSION}-aarch64-apple-darwin.dmg"              2>/dev/null || true
          echo "=== staged assets ==="
          ls -lh staging/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            staging/*
