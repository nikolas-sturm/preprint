name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-C target-cpu=x86-64-v3"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

        with:
          components: rustfmt

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev

      - name: Verify
        run: |
          cargo fmt --check
          cargo test
          cargo build --release

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Bundle
        continue-on-error: true
        shell: bash
        run: cargo bundle --release

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: preprint-${{ runner.os }}-binary
          path: |
            target/release/preprint
            target/release/preprint.exe
          if-no-files-found: warn

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: preprint-${{ runner.os }}-bundle
          path: |
            target/release/bundle/**
          if-no-files-found: warn
