name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUSTUP_TOOLCHAIN: 1.96.0

jobs:
  audit:
    name: dependency audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Disable local development overrides
        shell: bash
        run: rm .cargo/config.toml

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt --component clippy

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev pkg-config libfontconfig1-dev libgtk-3-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-dev libx11-xcb-dev libxrandr-dev libxi-dev libgl1-mesa-dev libvulkan1

      - name: Verify
        run: |
          cargo fmt --check
          cargo check --locked --all-targets
          cargo test --locked
          cargo clippy --locked --all-targets -- -D warnings
          cargo build --release --locked

      - name: Install cargo-bundle
        if: runner.os != 'Windows'
        run: cargo install cargo-bundle --version 0.11.0 --locked

      - name: Bundle
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            cargo bundle --release --format deb
            cargo bundle --release --format appimage
          else
            cargo bundle --release --format dmg
          fi

      - name: Upload release binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: preprint-${{ runner.os }}-binary
          path: |
            target/release/preprint
            target/release/preprint.exe
          if-no-files-found: error

      - name: Upload bundle artifacts
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: preprint-${{ runner.os }}-bundle
          path: |
            target/release/bundle/**
          if-no-files-found: error

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          iscc "/DMyAppVersion=$version" /Q preprint.iss

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: preprint-Windows-installer
          path: installer/*.exe
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [audit, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: artifacts

      - name: Stage release assets
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version $VERSION does not match Cargo.toml version $CARGO_VERSION" >&2
            exit 1
          fi
          mkdir -p staging
          # Raw binaries (required)
          cp artifacts/preprint-Linux-binary/preprint          "staging/preprint-${VERSION}-x86_64-unknown-linux-gnu"
          cp artifacts/preprint-Windows-binary/preprint.exe     "staging/preprint-${VERSION}-x86_64-pc-windows-msvc.exe"
          cp artifacts/preprint-macOS-binary/preprint           "staging/preprint-${VERSION}-aarch64-apple-darwin"
          # Installable bundles (required)
          cp "artifacts/preprint-Linux-bundle/appimage/"*.AppImage "staging/preprint-${VERSION}-x86_64-unknown-linux-gnu.AppImage"
          cp "artifacts/preprint-Linux-bundle/deb/"*.deb          "staging/preprint-${VERSION}-amd64.deb"
          cp "artifacts/preprint-macOS-bundle/dmg/"*.dmg           "staging/Preprint-${VERSION}-aarch64-apple-darwin.dmg"
          # Required by Windows update availability check
          cp "artifacts/preprint-Windows-installer/"*.exe          "staging/Preprint-${VERSION}-x86_64-setup.exe"
          echo "=== staged assets ==="
          ls -lh staging/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            --verify-tag \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            staging/*
